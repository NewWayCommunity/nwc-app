name: Build and Deploy Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Decode and Prepare Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/nwc-release-key.jks

      - name: Sign APK with Production Keystore
        run: |
          MY_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          build-tools/$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)/apksigner sign \
            --ks app/nwc-release-key.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEYSTORE_ALIAS }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --out app-release.apk "$MY_APK"

      - name: Delete Old GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete release --yes --cleanup-tag || true

      - name: Publish Fresh Clean Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release
          name: "Latest build"
          draft: false
          prerelease: false
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
